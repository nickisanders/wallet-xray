name: wallet-xray
region: nyc
services:
  - name: api
    git:
      repo_clone_url: https://github.com/nickisanders/wallet-xray.git
      branch: main
    run_command: node server.js
    environment_slug: node-js
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /health
